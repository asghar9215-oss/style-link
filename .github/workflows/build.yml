name: Build Android Local Asset App From File

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'StyleLink Pro'
      package_name:
        description: 'پیکیج کا نام (com.example.app)'
        required: true
        default: 'com.afuma.stylelink'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Project Directory
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/com/afuma/stylelink

      # 🚀 خودکار طریقہ: گٹ ہب پر موجود index.html فائل کو ایپ کے اثاثوں میں کاپی کرنا
      - name: Copy HTML File from Repository to Assets
        run: |
          if [ -f "index.html" ]; then
            cp index.html app/src/main/assets/index.html
          else
            echo "ERROR: ریپوزٹری کے مین پیج پر index.html فائل نہیں ملی!"
            exit 1
          fi

      - name: Generate Android Native Java Source Code
        run: |
          cat << 'EOF' > app/src/main/java/com/afuma/stylelink/MainActivity.java
          package com.afuma.stylelink;

          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;

          public class MainActivity extends Activity {
              private WebView myWebView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  myWebView = new WebView(this);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setGeolocationEnabled(true);

                  myWebView.setWebViewClient(new WebViewClient());
                  myWebView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }
                  });

                  myWebView.loadUrl("file:///android_asset/index.html");
                  setContentView(myWebView);
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) {
                      myWebView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Generate Android Manifest File
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.afuma.stylelink">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />

              <application
                  android:allowBackup="true"
                  android:label="${{ github.event.inputs.app_name }}"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Automatically Generate New Keystore File
        run: |
          keytool -genkey -v -keystore app/autogenerated.keystore -alias stylelink -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLinkPass123" -keypass "StyleLinkPass123" -dname "CN=StyleLink, OU=App, O=StyleLink, L=Lahore, S=Punjab, C=PK"

      - name: Generate Build Gradle Configuration with Auto-Keystore
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "style-link"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }

          android {
              namespace 'com.afuma.stylelink'
              compileSdk 34

              signingConfigs {
                  release {
                      storeFile file("autogenerated.keystore")
                      storePassword "StyleLinkPass123"
                      keyAlias "stylelink"
                      keyPassword "StyleLinkPass123"
                  }
              }

              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 24
                  targetSdk 34
                  versionCode 10001
                  versionName "1.0.1"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties

      - name: Build Official Signed AAB and APK Files
        run: |
          export GRADLE_USER_HOME=$HOME/.gradle_clean
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:bundleRelease :app:assembleRelease --no-build-cache

      - name: Upload StyleLinkPro Official Signed AAB File
        uses: actions/upload-artifact@v4
        with:
          name: StyleLinkPro_AutoSigned_AAB
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload StyleLinkPro Testing Signed APK File
        uses: actions/upload-artifact@v4
        with:
          name: StyleLinkPro_AutoSigned_APK
          path: app/build/outputs/apk/release/app-release.apk
