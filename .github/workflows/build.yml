name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2478cbd3374441e92e42817d404479a1565b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      # 📦 حصہ 1: پلے اسٹور کے لیے مستقل سائنڈ .AAB فائل بنانا
      - name: Build Official AAB Bundle
        run: |
          npm install -g cordova
          cordova create aab_project ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd aab_project
          cordova platform add android --save
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html
          
          # آفیشل پکی چابی بنانا
          keytool -genkey -v -keystore playstore.keystore -alias stylelink_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLink123" -keypass "StyleLink123" -dname "CN=Asghar Ali, OU=Production, O=StyleLink, L=Lahore, S=Punjab, C=PK"
          
          # کمپائل کرنا
          cordova build android --release -- --packageType=bundle
          
          # فائل کاپی اور چابی سے لاک کرنا
          cp platforms/android/app/build/outputs/bundle/release/app-release.aab ../StyleLinkPro_Production.aab
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_Production.aab stylelink_alias -storepass "StyleLink123"

      # 📱 حصہ 2: بالکل الگ فولڈر میں موبائل ٹیسٹنگ کے لیے .APK فائل بنانا
      - name: Build Testing APK File
        run: |
          cordova create apk_project ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd apk_project
          cordova platform add android --save
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html
          
          # الگ پروجیکٹ کے لیے چابی بنانا
          keytool -genkey -v -keystore playstore.keystore -alias stylelink_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLink123" -keypass "StyleLink123" -dname "CN=Asghar Ali, OU=Production, O=StyleLink, L=Lahore, S=Punjab, C=PK"
          
          # کمپائل کرنا
          cordova build android --release
          
          # فائل کاپی اور چابی سے لاک کرنا
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ../StyleLinkPro_Production.apk
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_Production.apk stylelink_alias -storepass "StyleLink123"

      # 🔐 مستقل لائف ٹائم سیکیورٹی چابی کو گٹ ہب میں محفوظ کرنا
      - name: Save Permanent Keystore Back to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp aab_project/playstore.keystore ./playstore.keystore
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add playstore.keystore
          git commit -m "🔐 Master Play Store Keystore Saved" || true
          git push origin main --force || true

      # 📥 دونوں تیار فائلیں ڈاؤن لوڈ کے لیے اپلوڈ کرنا
      - name: Upload Both Android Files
        uses: actions/upload-artifact@v4
        with:
          name: Finished-Android-Files
          path: |
            StyleLinkPro_Production.apk
            StyleLinkPro_Production.aab

