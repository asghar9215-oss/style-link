name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Android Hybrid Builder
        run: |
          npm install -g cordova
          cordova create studio_app ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd studio_app
          cordova platform add android
          
          # اصلی کوڈ کے اندر کسٹمر کا بلاگر لنک فٹ کرنا
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Real Android Package
        run: |
          cd studio_app
          if [ "${{ github.event.inputs.build_type }}" = "apk" ]; then
            cordova build android --debug
            cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../StyleLinkPro.apk
          else
            cordova build android --release -- --packageType=bundle
            cp platforms/android/app/build/outputs/bundle/release/app-release.aab ../StyleLinkPro.aab
          fi

      - name: Upload Finished Real File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ github.event.inputs.build_type }}
          path: |
            *.apk
            *.aab

