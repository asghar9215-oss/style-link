name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }} # 🔑 سیکیورٹی ٹوکن فکس

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2478cbd3374441e92e42817d404479a1565b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      - name: Install Android Hybrid Builder
        run: |
          npm install -g cordova
          cordova create studio_app ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd studio_app
          cordova platform add android --save
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html

      - name: Manage Permanent Keystore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd studio_app
          if [ -f "../playstore.keystore" ]; then
            echo "🔒 پرانی محفوظ شدہ چابی مل گئی ہے..."
            cp ../playstore.keystore ./playstore.keystore
          else
            echo "🆕 نئی مستقل چابی بنائی جا رہی ہے..."
            keytool -genkey -v -keystore playstore.keystore -alias electric_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "Electric123" -keypass "Electric123" -dname "CN=Asghar Ali, OU=Production, O=ElectricMaster, L=Lahore, S=Punjab, C=PK"
            cp playstore.keystore ../playstore.keystore
            
            # گٹ ہب رائٹ پرمیشن بائی پاس کنفیگریشن
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            
            git add ../playstore.keystore
            git commit -m "🔐 Permanent Play Store Keystore Locked" || true
            git push origin main || true
          fi

      - name: Compile Real Android Package
        run: |
          cd studio_app
          if [ "${{ github.event.inputs.build_type }}" = "aab" ]; then
            cordova build android --release -- --packageType=bundle
            find platforms/android/ -name "*.aab" -exec cp {} ../ElectricMaster_Production.aab \;
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../ElectricMaster_Production.aab electric_alias -storepass "Electric123"
          else
            cordova build android --release
            find platforms/android/ -name "*.apk" -exec cp {} ../ElectricMaster_Production.apk \;
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../ElectricMaster_Production.apk electric_alias -storepass "Electric123"
          fi

      - name: Upload Finished Real File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: |
            ElectricMaster_Production.apk
            ElectricMaster_Production.aab
