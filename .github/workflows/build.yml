name: Auto Build Signed AAB From Scratch
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Initialize App Files Automatically
        run: |
          # 1. پیکیج فائل بنانا
          npm init -y
          
          # 2. ضروری ٹولز انسٹال کرنا
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          # 3. عارضی فولڈر بنانا
          mkdir -p www
          echo '<!DOCTYPE html><html><body>Loading...</body></html>' > www/index.html
          
          # 4. آپ کی بلاگر ویب سائٹ کا لنک سیٹ کرنا
          echo '{"appId": "com.asghar9215.stylelink", "appName": "Afuma Water", "webDir": "www", "server": {"url": "https://ceakle.blogspot.com/?m=1", "cleartext": true}}' > capacitor.config.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Create Native Android Folder
        run: |
          # اینڈرائیڈ کا فولڈر خودکار بنانا
          npx cap add android
          npx cap sync android

      - name: Build Android App (AAB)
        run: |
          # گریڈل کنفیگریشن فائل میں ورژن کا نام براہ راست 8.7 پر تبدیل کرنا (تاکہ پرانا ورژن رن ہی نہ ہو)
          sed -i 's/gradle-8.2.1-all.zip/gradle-8.7-all.zip/g' android/gradle/wrapper/gradle-wrapper.properties
          
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Generate Keystore & Sign AAB Automatically
        run: |
          # پلے اسٹور کی ضرورت کے مطابق خودکار سائننگ کی بنانا
          keytool -genkey -v -keystore my-release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias my-alias -storepass mypassword -keypass mypassword -dname "CN=Asghar, OU=Afuma, O=Water, L=PK, S=PK, C=PK"
          
          # AAB فائل پر ڈیجیٹل دستخط (Sign) کرنا
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore my-release-key.jks -storepass mypassword android/app/build/outputs/bundle/release/app-release.aab my-alias

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
