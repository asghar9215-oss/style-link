name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2478cbd3374441e92e42817d404479a1565b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      # 🛠️ کلاؤڈ پر پروجیکٹ سیٹ اپ کرنا
      - name: Install Android Hybrid Builder
        run: |
          npm install -g cordova
          cordova create studio_app ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd studio_app
          cordova platform add android --save
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html
          
          # مستقل لائف ٹائم چابی جنریٹ کرنا
          keytool -genkey -v -keystore playstore.keystore -alias stylelink_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLink123" -keypass "StyleLink123" -dname "CN=Asghar Ali, OU=Production, O=StyleLink, L=Lahore, S=Punjab, C=PK"

      # 📦 1۔ پلے اسٹور کے لیے آفیشل .AAB بنانا اور سائن کرنا
      - name: Generate Official AAB
        run: |
          cd studio_app
          cordova build android --release -- --packageType=bundle
          cp platforms/android/app/build/outputs/bundle/release/app-release.aab ../StyleLinkPro_PlayStore.aab
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_PlayStore.aab stylelink_alias -storepass "StyleLink123"

      # 📱 2۔ موبائل ٹیسٹنگ کے لیے اصلی .APK بنانا اور سائن کرنا
      - name: Generate Testing APK
        run: |
          cd studio_app
          cordova build android --release -- --packageType=apk
          cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ../StyleLinkPro_Testing.apk
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_Testing.apk stylelink_alias -storepass "StyleLink123"

      # 🔐 چابی کو ہمیشہ کے لیے گٹ ہب میں سیو رکھنا
      - name: Save Keystore
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp studio_app/playstore.keystore ./playstore.keystore
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add playstore.keystore
          git commit -m "🔐 Keystore Saved Successfully" || true
          git push origin main --force || true

      # 📥 دونوں فائلوں کو ڈاؤن لوڈ کے لیے ایک ساتھ اپلوڈ کرنا
      - name: Upload Finished Files
        uses: actions/upload-artifact@v4
        with:
          name: StyleLink-Pro-Package-Files
          path: |
            StyleLinkPro_PlayStore.aab
            StyleLinkPro_Testing.apk

