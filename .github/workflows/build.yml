name: Build Android Master Webview App

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'ایپ کا نام درج کریں'
        required: true
        default: 'StyleLink Pro'
      package_name:
        description: 'پیکیج کا نام (com.example.app)'
        required: true
        default: 'com.afuma.stylelink'
      version_code:
        description: 'ورژن کوڈ لکھیں (یہ ہمیشہ پچھلی بلڈ سے بڑا نمبر ہونا چاہیے)'
        required: true
        default: '10005'
      version_name:
        description: 'ورژن کا نام لکھیں (جیسے 1.0.5)'
        required: true
        default: '1.0.5'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Android Project Directory
        run: |
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/afuma/stylelink

      - name: Generate Android Native Java Source Code
        run: |
          cat << 'EOF' > app/src/main/java/com/afuma/stylelink/MainActivity.java
          package com.afuma.stylelink;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.GeolocationPermissions;
          import android.webkit.WebChromeClient;
          import android.webkit.ValueCallback;
          import android.webkit.URLUtil;
          import android.os.Build;
          import android.os.Environment;
          import android.app.DownloadManager;
          import android.content.Context;
          import android.widget.Toast;

          public class MainActivity extends Activity {
              private WebView myWebView;
              private ValueCallback<Uri[]> uploadMessage;
              private final static int FILECHOOSER_RESULTCODE = 1;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                      requestPermissions(new String[]{
                              "android.permission.ACCESS_FINE_LOCATION",
                              "android.permission.ACCESS_COARSE_LOCATION",
                              "android.permission.WRITE_EXTERNAL_STORAGE"
                      }, 1);
                  }

                  myWebView = new WebView(this);
                  WebSettings webSettings = myWebView.getSettings();
                  webSettings.setJavaScriptEnabled(true);
                  webSettings.setDomStorageEnabled(true);
                  webSettings.setAllowFileAccess(true);
                  webSettings.setGeolocationEnabled(true);
                  webSettings.setDatabaseEnabled(true);
                  
                  webSettings.setAllowContentAccess(true);
                  webSettings.setMediaPlaybackRequiresUserGesture(false);

                  myWebView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          if (url.startsWith("tel:")) {
                              Intent intent = new Intent(Intent.ACTION_DIAL, Uri.parse(url));
                              startActivity(intent);
                              return true;
                          }
                          
                          if (url.startsWith("whatsapp:") || url.contains("api.whatsapp.com") || url.contains("wa.me")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  intent.setFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Toast.makeText(MainActivity.this, "موبائل میں واٹس ایپ انسٹال نہیں ہے!", Toast.LENGTH_SHORT).show();
                                  return true;
                              }
                          }

                          if (url.startsWith("http://googleusercontent.com/maps.google.com/") || url.contains("maps") || url.startsWith("intent:")) {
                              try {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                  startActivity(intent);
                                  return true;
                              } catch (Exception e) {
                                  Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse("https://maps.google.com"));
                                  startActivity(intent);
                                  return true;
                              }
                          }
                          return false;
                      }
                  });

                  myWebView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String origin, GeolocationPermissions.Callback callback) {
                          callback.invoke(origin, true, false);
                      }

                      @Override
                      public boolean onShowFileChooser(WebView webView, ValueCallback<Uri[]> filePathCallback, WebChromeClient.FileChooserParams fileChooserParams) {
                          if (uploadMessage != null) {
                              uploadMessage.onReceiveValue(null);
                          }
                          uploadMessage = filePathCallback;
                          Intent intent = fileChooserParams.createIntent();
                          try {
                              startActivityForResult(intent, FILECHOOSER_RESULTCODE);
                          } catch (Exception e) {
                              uploadMessage = null;
                              return false;
                          }
                          return true;
                      }
                  });

                  myWebView.setDownloadListener((downloadUrl, userAgent, contentDisposition, mimeType, contentLength) -> {
                      try {
                          DownloadManager.Request request = new DownloadManager.Request(Uri.parse(downloadUrl));
                          request.setMimeType(mimeType);
                          request.setDescription("فائل ڈاؤن لوڈ ہو رہی ہے...");
                          request.setTitle(URLUtil.guessFileName(downloadUrl, contentDisposition, mimeType));
                          request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                          request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, URLUtil.guessFileName(downloadUrl, contentDisposition, mimeType));
                          
                          DownloadManager dm = (DownloadManager) getSystemService(Context.DOWNLOAD_SERVICE);
                          if (dm != null) {
                              dm.enqueue(request);
                              Toast.makeText(MainActivity.this, "ڈاؤن لوڈنگ شروع ہو چکی ہے...", Toast.LENGTH_LONG).show();
                          }
                      } catch (Exception e) {
                          Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(downloadUrl));
                          startActivity(intent);
                      }
                  });

                  myWebView.loadUrl("https://asghar9215-oss.github.io/style-link/");
                  setContentView(myWebView);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (uploadMessage == null) return;
                      uploadMessage.onReceiveValue(WebChromeClient.FileChooserParams.parseResult(resultCode, data));
                      uploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  if (myWebView.canGoBack()) {
                      myWebView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Generate Android Manifest File
        run: |
          cat << EOF > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.afuma.stylelink">

              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />

              <application
                  android:allowBackup="true"
                  android:label="${{ github.event.inputs.app_name }}"
                  android:icon="@android:drawable/sym_def_app_icon"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar.Fullscreen"
                  android:usesCleartextTraffic="true">
                  
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize|keyboardHidden">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      # 🔑 نئی پکی چابی بنانا اور اس کا گوگل ری سیٹ سرٹیفکیٹ (.pem) نکالنا
      - name: Generate Permanent Master Keystore and Reset Pem
        run: |
          keytool -genkey -v -keystore app/stylelink_master.keystore -alias stylelink_master_key -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLinkPass786" -keypass "StyleLinkPass786" -dname "CN=StyleLink, OU=App, O=StyleLink, L=Lahore, S=Punjab, C=PK"
          keytool -export -rfc -keystore app/stylelink_master.keystore -alias stylelink_master_key -file app/upload_certificate.pem -storepass "StyleLinkPass786"

      - name: Generate Build Gradle Configuration
        run: |
          cat << 'EOF' > settings.gradle
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "style-link"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          buildscript { repositories { google(); mavenCentral() }; dependencies { classpath 'com.android.tools.build:gradle:8.2.2' } }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.afuma.stylelink'
              compileSdk 34
              signingConfigs { release { storeFile file("stylelink_master.keystore"); storePassword "StyleLinkPass786"; keyAlias "stylelink_master_key"; keyPassword "StyleLinkPass786" } }
              
              defaultConfig { 
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 24
                  targetSdk 34
                  versionCode ${{ github.event.inputs.version_code }}
                  versionName "${{ github.event.inputs.version_name }}"
              }
              buildTypes { release { minifyEnabled false; signingConfig signingConfigs.release } }
          }
          EOF
          echo "org.gradle.jvmargs=-Xmx2048m" > gradle.properties

      - name: Build Official Signed AAB and APK Files
        run: |
          export GRADLE_USER_HOME=$HOME/.gradle_clean
          gradle wrapper --gradle-version 8.5
          ./gradlew :app:bundleRelease :app:assembleRelease --no-build-cache

      # 🔥 یہاں ہم گوگل کے لیے سرٹیفکیٹ اور پلے اسٹور کی فائلیں دونوں ڈاؤن لوڈ فولڈر میں ڈال رہے ہیں
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StyleLink_PlayStore_And_Reset_Key
          path: |
            app/build/outputs/bundle/release/app-release.aab
            app/build/outputs/apk/release/app-release.apk
            app/upload_certificate.pem
