name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 📜 گوگل اینڈرائیڈ کے تمام سیکیورٹی لائسنس خودکار قبول کرنے کا سسٹم
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2478cbd3374441e92e42817d404479a1565b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      - name: Install Android Hybrid Builder
        run: |
          npm install -g cordova
          cordova create studio_app ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd studio_app
          cordova platform add android --save
          
          # اصلی پلے اسٹور ویب ویو کنکشن
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html

      - name: Generate Official Signing Key & Compile
        run: |
          cd studio_app
          
          # پلے اسٹور کی آفیشل سائننگ چابی تیار کرنا
          keytool -genkey -v -keystore playstore.keystore -alias stylelink_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLink123" -keypass "StyleLink123" -dname "CN=Asghar Ali, OU=Production, O=StyleLink, L=Lahore, S=Punjab, C=PK"
          
          if [ "${{ github.event.inputs.build_type }}" = "aab" ]; then
            # پلے اسٹور کے لیے اصلی .AAB بنانا
            cordova build android --release -- --packageType=bundle
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore platforms/android/app/build/outputs/bundle/release/app-release.aab stylelink_alias -storepass "StyleLink123"
            cp platforms/android/app/build/outputs/bundle/release/app-release.aab ../StyleLinkPro_Production.aab
          else
            # موبائل ٹیسٹنگ کے لیے اصلی سائنڈ .APK بنانا
            cordova build android --release
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk stylelink_alias -storepass "StyleLink123"
            cp platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk ../StyleLinkPro_Production.apk
          fi

      - name: Upload Finished Real File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-${{ github.event.inputs.build_type }}-Production
          path: |
            *.apk
            *.aab
