name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses
        run: |
          mkdir -p ${ANDROID_HOME}/licenses
          echo "244d2478cbd3374441e92e42817d404479a1565b" > ${ANDROID_HOME}/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > ${ANDROID_HOME}/licenses/android-sdk-preview-license

      - name: Install Android Hybrid Builder
        run: |
          npm install -g cordova
          cordova create studio_app ${{ github.event.inputs.package_name }} "${{ github.event.inputs.app_name }}"
          cd studio_app
          cordova platform add android --save
          echo "<script>window.location.href='${{ github.event.inputs.app_url }}';</script>" > www/index.html

      # 🔐 مستقل سیکیورٹی چابی کو چیک اور لاک کرنے کا خودکار نظام
      - name: Manage Permanent Keystore
        run: |
          cd studio_app
          if [ -f "../playstore.keystore" ]; then
            echo "🔒 پرانی محفوظ شدہ چابی مل گئی ہے، اسی کو استعمال کیا جا رہا ہے..."
            cp ../playstore.keystore ./playstore.keystore
          else
            echo "🆕 پہلی بار رن ہو رہا ہے، نئی مستقل چابی بنائی جا رہی ہے..."
            keytool -genkey -v -keystore playstore.keystore -alias stylelink_alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "StyleLink123" -keypass "StyleLink123" -dname "CN=Asghar Ali, OU=Production, O=StyleLink, L=Lahore, S=Punjab, C=PK"
            cp playstore.keystore ../playstore.keystore
            
            # چابی کو مستقل طور پر آپ کے گٹ ہب اکاؤنٹ پر سیو کرنا
            git config --global user.name "GitHub Actions"
            git config --global user.email "actions@github.com"
            git add ../playstore.keystore
            git commit -m "🔐 Permanent Play Store Keystore Locked" || true
            git push || true
          fi

      - name: Compile Real Android Package
        run: |
          cd studio_app
          if [ "${{ github.event.inputs.build_type }}" = "aab" ]; then
            cordova build android --release -- --packageType=bundle
            find platforms/android/ -name "*.aab" -exec cp {} ../StyleLinkPro_Production.aab \;
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_Production.aab stylelink_alias -storepass "StyleLink123"
          else
            cordova build android --release
            find platforms/android/ -name "*.apk" -exec cp {} ../StyleLinkPro_Production.apk \;
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 -keystore playstore.keystore ../StyleLinkPro_Production.apk stylelink_alias -storepass "StyleLink123"
          fi

      - name: Upload Finished Real File
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}
          path: |
            StyleLinkPro_Production.apk
            StyleLinkPro_Production.aab
