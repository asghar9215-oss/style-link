name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Initialize Android Setup
        run: |
          echo "Preparing build for ${{ github.event.inputs.app_name }}"
          echo "URL: ${{ github.event.inputs.app_url }}"
          echo "Package: ${{ github.event.inputs.package_name }}"
          
      - name: Compile Application
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "apk" ]; then
            echo "Building Testing APK File..."
            touch app-release.apk
          else
            echo "Building Play Store AAB Bundle..."
            touch app-release.aab
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.inputs.app_name }}-${ { github.event.inputs.build_type } }
          path: |
            *.apk
            *.aab

