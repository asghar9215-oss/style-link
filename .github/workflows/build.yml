name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-level: 18

    - name: Install PWA Asset & Capacitor
      run: |
        npm install -g @capacitor/cli @capacitor/core
        npm install
        npx cap init "Style Link" "com.ceakle.stylelink" --web-dir=.
        npm install @capacitor/android
        npx cap add android

    - name: Sync Capacitor with Android
      run: npx cap sync android

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK (Debug/Release)
      run: |
        cd android && ./gradlew assembleDebug

    - name: Build AAB (App Bundle for Play Store)
      run: |
        cd android && ./gradlew bundleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: StyleLink-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v3
      with:
        name: StyleLink-AAB
        path: android/app/build/outputs/bundle/release/app-release.aab

