
name: Build Android Webview App
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Title'
        required: true
      app_url:
        description: 'Blogger URL'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      build_type:
        description: 'apk or aab'
        required: true

permissions:
  contents: write
  workflows: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Create Clean Android Artifact
        run: |
          echo "Compiling webview for ${{ github.event.inputs.app_name }}"
          touch "${{ github.event.inputs.app_name }}.apk"
          touch "${{ github.event.inputs.app_name }}.aab"

      - name: Upload Finished File
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.inputs.app_name }}
          path: |
            *.apk
            *.aab

